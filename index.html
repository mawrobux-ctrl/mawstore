<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MawStore - Top Up Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        .game-card { border: 2px solid #e2e8f0; transition: 0.3s; cursor: pointer; background: white; }
        .game-card.active { border-color: #3b82f6; background-color: #eff6ff; transform: translateY(-5px); }
        .item-card { border: 2px solid #e2e8f0; transition: 0.2s; cursor: pointer; background: white; }
        .item-card.active { border-color: #8b5cf6; background-color: #f5f3ff; font-weight: bold; }
        .pay-card { border: 2px solid #e2e8f0; transition: 0.2s; cursor: pointer; background: white; }
        .pay-card.active { border-color: #10b981; background-color: #ecfdf5; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-extrabold text-blue-600 uppercase">Maw<span class="text-purple-500">Store</span></h1>
        </div>
    </nav>

    <div class="bg-blue-600 py-10 text-center text-white px-4">
        <h2 class="text-3xl font-bold">Top Up Game Murah</h2>
        <p class="mt-2 text-blue-100">Proses Cepat & Amanah</p>
    </div>

    <div class="container mx-auto px-4 mt-8 max-w-4xl">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-slate-100">
            <h3 class="font-bold text-lg mb-4 text-blue-700">1. Pilih Game</h3>
            <div class="grid grid-cols-3 gap-3">
                <div onclick="selectGame('ml')" id="btn-ml" class="game-card rounded-2xl p-4 text-center">
                    <div class="text-4xl mb-2">⚔️</div>
                    <p class="text-[10px] font-extrabold uppercase text-blue-800">MLBB</p>
                </div>
                <div onclick="selectGame('ff')" id="btn-ff" class="game-card rounded-2xl p-4 text-center">
                    <div class="text-4xl mb-2">🔥</div>
                    <p class="text-[10px] font-extrabold uppercase text-orange-600">Free Fire</p>
                </div>
                <div onclick="selectGame('robux')" id="btn-robux" class="game-card rounded-2xl p-4 text-center">
                    <div class="text-4xl mb-2">🧱</div>
                    <p class="text-[10px] font-extrabold uppercase text-slate-700">Robux</p>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-slate-100">
            <h3 class="font-bold text-lg mb-4 text-blue-700">2. Data Akun</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="userId" placeholder="User ID" class="bg-slate-50 border-2 p-4 rounded-xl outline-none focus:border-blue-400 w-full">
                <input type="text" id="zoneId" placeholder="Server ID" class="bg-slate-50 border-2 p-4 rounded-xl outline-none focus:border-blue-400 w-full">
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-slate-100">
            <h3 class="font-bold text-lg mb-4 text-blue-700">3. Pilih Nominal</h3>
            <div id="nominalList" class="grid grid-cols-2 md:grid-cols-3 gap-3 text-center">
                <p class="col-span-full text-slate-400 italic py-4 text-sm">Pilih game di atas...</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-slate-100">
            <h3 class="font-bold text-lg mb-4 text-blue-700">4. Pembayaran</h3>
            <div class="grid grid-cols-2 gap-3">
                <div onclick="selectPay('DANA')" id="pay-DANA" class="pay-card rounded-xl p-3 text-center">
                    <span class="text-xs font-bold">🔵 DANA</span>
                </div>
                <div onclick="selectPay('GOPAY')" id="pay-GOPAY" class="pay-card rounded-xl p-3 text-center">
                    <span class="text-xs font-bold">🟢 GOPAY</span>
                </div>
            </div>
        </div>

        <button onclick="checkout()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl shadow-lg transition-all active:scale-95 text-xl uppercase">
            Pesan Sekarang
        </button>
    </div>

    <footer class="text-center py-10 text-slate-400 text-[10px] font-bold uppercase">
        &copy; 2026 MAWSTORE OFFICIAL
    </footer>

    <script>
        const hargaData = {
            ml: ["5 DM - Rp 3.446", "12 DM - Rp 5.366", "28 DM - Rp 9.698", "85 DM - Rp 24.166", "170 DM - Rp 46.332", "427 DM - Rp 113.062"],
            ff: ["5 DM - Rp 1.020", "50 DM - Rp 8.400", "100 DM - Rp 14.800", "355 DM - Rp 54.500", "720 DM - Rp 89.500"],
            robux: ["80 RBX - Rp 16k", "400 RBX - Rp 75k", "800 RBX - Rp 140k", "1000 RBX - Rp 152k"]
        };

        let sGame = "", sNominal = "", sPay = "";

        function selectGame(game) {
            sGame = game; sNominal = "";
            document.querySelectorAll('.game-card').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-' + game).classList.add('active');
            const list = document.getElementById('nominalList'); list.innerHTML = "";
            hargaData[game].forEach(item => {
                const div = document.createElement('div');
                div.className = "item-card border-2 p-4 rounded-xl text-center text-[11px]";
                div.innerText = item;
                div.onclick = () => {
                    document.querySelectorAll('.item-card').forEach(el => el.classList.remove('active'));
                    div.classList.add('active'); sNominal = item;
                };
                list.appendChild(div);
            });
        }

        function selectPay(pay) {
            sPay = pay;
            document.querySelectorAll('.pay-card').forEach(el => el.classList.remove('active'));
            document.getElementById('pay-' + pay).classList.add('active');
        }

        function checkout() {
            const id = document.getElementById('userId').value;
            const zone = document.getElementById('zoneId').value;
            const ig = "mawstore_id"; 

            if (!sGame || !sNominal || !id || !sPay) {
                alert("Mohon lengkapi data!");
                return;
            }

            const msg = `Order: ${sGame}\nNominal: ${sNominal}\nID: ${id} (${zone})\nBayar: ${sPay}`;
            alert("Copy pesan ini:\n\n" + msg);
            window.open("https://www.instagram.com/direct/t/" + ig, "_blank");
        }
    </script>
</body>
</html>
